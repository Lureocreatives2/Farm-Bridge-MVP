<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — FarmBridge</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .back { display: inline-flex; align-items: center; gap: .4rem; color: var(--g700); font-weight: 600; font-size: .875rem; margin-bottom: 1.5rem; transition: gap var(--t); }
    .back:hover { gap: .6rem; }

    .detail { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    @media(max-width:768px) { .detail { grid-template-columns: 1fr; gap: 1.5rem; } }

    .detail__img { border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-lg); background: var(--cream2); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 6rem; }
    .detail__img img { width: 100%; height: 100%; object-fit: cover; }

    .detail__price-box { background: var(--cream2); border-radius: var(--r-md); padding: 1rem 1.25rem; display: flex; align-items: baseline; gap: .4rem; margin: 1.2rem 0; }
    .detail__price { font-family: var(--font-d); font-size: 2.2rem; font-weight: 800; color: var(--g700); }
    .detail__unit { color: var(--muted); font-size: .95rem; }

    .detail__meta { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; margin: 1.2rem 0; }
    .meta-box { background: var(--cream); border-radius: var(--r-sm); padding: .6rem .9rem; }
    .meta-box__lbl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .meta-box__val { font-size: .92rem; font-weight: 600; color: var(--ink); margin-top: .1rem; }

    .farmer-row { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 1rem; display: flex; align-items: center; gap: .9rem; margin: 1.2rem 0; }
    .farmer-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--g100); color: var(--g700); font-family: var(--font-d); font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .safety { background: var(--a50); border: 1px solid var(--a300); border-radius: var(--r-sm); padding: .7rem 1rem; font-size: .8rem; color: #92400e; display: flex; gap: .5rem; margin: .75rem 0; }
  </style>
</head>
<body>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>

  <main class="section">
    <div class="container">
      <a href="javascript:history.back()" class="back">← Back</a>
      <div id="content">
        <div class="detail">
          <div class="skeleton" style="aspect-ratio:4/3;border-radius:var(--r-xl)"></div>
          <div style="display:flex;flex-direction:column;gap:1rem">
            <div class="skeleton" style="height:20px;width:80px"></div>
            <div class="skeleton" style="height:48px"></div>
            <div class="skeleton" style="height:70px"></div>
            <div class="skeleton" style="height:54px;border-radius:var(--r-md)"></div>
          </div>
        </div>
      </div>
      <div id="related" style="margin-top:4rem;display:none">
        <div class="section-title"><h2>More Products</h2></div>
        <div class="products-grid" id="relatedGrid"></div>
      </div>
    </div>
  </main>

  <script>
    initLayout("shop");

    const id = Utils.getParam("id");
    if (!id) window.location.href = "shop.html";

    async function load() {
      try {
        const { data: p } = await ProductsAPI.getById(id);
        document.title = `${p.name} — FarmBridge`;
        const f = p.farmer, u = f?.user;
        const initials = (u?.name || "F").split(" ").map((n) => n[0]).join("").toUpperCase().slice(0, 2);
        const waLink = Utils.buildWhatsApp(u?.phone || "234000000000", p.name, u?.name || "the farmer");
        const color = Utils.catColor[p.category] || "#888";

        document.getElementById("content").innerHTML = `
          <div class="detail">
            <div class="detail__img">${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" />` : Utils.catEmoji[p.category]||"🌾"}</div>
            <div>
              <span class="badge" style="background:${color}">${Utils.titleCase(p.category)}</span>
              <h1 style="margin:.5rem 0 .3rem;font-size:clamp(1.5rem,3vw,2.2rem)">${p.name}</h1>
              <p style="color:var(--muted);font-size:.83rem">Listed ${Utils.timeAgo(p.createdAt)}</p>
              <div class="detail__price-box">
                <span class="detail__price">${Utils.formatNaira(p.price)}</span>
                <span class="detail__unit">/ ${p.unit}</span>
              </div>
              <p style="color:var(--ink2);line-height:1.8;margin-bottom:1.2rem">${p.description}</p>
              <div class="detail__meta">
                <div class="meta-box"><div class="meta-box__lbl">Category</div><div class="meta-box__val">${Utils.titleCase(p.category)}</div></div>
                <div class="meta-box"><div class="meta-box__lbl">Unit</div><div class="meta-box__val">${p.unit}</div></div>
                <div class="meta-box"><div class="meta-box__lbl">Location</div><div class="meta-box__val">📍 ${f?.state||"Nigeria"}</div></div>
                <div class="meta-box"><div class="meta-box__lbl">Status</div><div class="meta-box__val" style="color:var(--g500)">✓ Available</div></div>
              </div>
              <div class="farmer-row">
                <div class="farmer-avatar">${initials}</div>
                <div>
                  <div style="font-weight:700;color:var(--ink)">${u?.name||"Unknown"}</div>
                  <div style="font-size:.83rem;color:var(--g700)">🏡 ${f?.farmName||"—"}</div>
                  <div style="font-size:.78rem;color:var(--muted)">📍 ${f?.state||"—"}</div>
                </div>
              </div>
              <a href="${waLink}" target="_blank" rel="noopener" class="btn btn--whatsapp btn--full" style="margin-bottom:.75rem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.114.553 4.103 1.523 5.832L.043 23.07a.883.883 0 001.065 1.08l5.39-1.43A11.956 11.956 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.372l-.36-.214-3.726.988.996-3.635-.235-.373A9.818 9.818 0 1112 21.818z"/></svg>
                Contact Farmer on WhatsApp
              </a>
              <div class="safety">⚠️ <span>Always inspect goods before payment. FarmBridge doesn't process transactions — deal directly with the farmer.</span></div>
              <a href="shop.html" class="btn btn--outline btn--full">← Browse More Products</a>
            </div>
          </div>`;
        loadRelated(p.category, p.id);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="empty"><div class="empty__icon">⚠️</div><h3>Product not found</h3><p>${err.message}</p><a href="shop.html" class="btn btn--green" style="margin-top:1rem">Browse Products</a></div>`;
      }
    }

    async function loadRelated(category, excludeId) {
      try {
        const { data } = await ProductsAPI.getAll({ category });
        const rel = data.filter((p) => p.id !== excludeId).slice(0, 3);
        if (!rel.length) return;
        document.getElementById("related").style.display = "block";
        document.getElementById("relatedGrid").innerHTML = rel.map(Utils.card).join("");
      } catch {}
    }

    load();
  </script>
</body>
</html>
