# render.yaml
# Infrastructure-as-code for Render.com
# Commit this to your repo and Render will auto-detect it.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: farmbridge-api
    env: node
    region: frankfurt          # closest to Nigeria; or use oregon if latency is acceptable
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy"
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farmbridge-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false            # fill in manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false            # e.g. https://farmbridge.netlify.app

databases:
  - name: farmbridge-db
    databaseName: farmbridge
    user: farmbridge_user
    plan: free
